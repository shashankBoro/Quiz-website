<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Website</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navigation -->
<nav>
    <a onclick="showSection('home')">Home</a>
    <a onclick="showSection('quiz')">Quiz</a>
    <a onclick="showSection('about')">About</a>
</nav>

<!-- Home Section -->
<div id="home" class="section active">
    <h1>🎓 Welcome to Quiz Website</h1>
    <p>Improve your knowledge by taking interactive quizzes.</p>
    <button onclick="showSection('quiz')">Start Quiz</button>
</div>

<!-- Quiz Section -->
<div id="quiz" class="section">
    <div class="container">
        <h2>🧠 Quiz</h2>
        <div id="quizBox"></div>
        <button onclick="nextQuestion()">Next</button>
    </div>
</div>

<!-- About Section -->
<div id="about" class="section">
    <h2>About</h2>
    <p>This project is created using HTML, CSS, and JavaScript.</p>
</div>

<footer>
    <p>Shashank Boro | BCA (IBM) | Section A</p>
</footer>

<script src="script.js"></script>
</body>
</html>
